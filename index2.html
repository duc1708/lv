<head>
    <meta charset="UTF-8">

    <title>Love Slider</title>

    <style>
        body {
            margin: 0;
            background: #111;
            font-family: sans-serif;
        }
        
        #section-3 {
            height: 100vh;
            background: #111;
            overflow: hidden;
            position: relative;
        }
        
        .photo-contain {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .photo {
            position: absolute;
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            transition: all 2s ease;
        }
        
        .fall-text {
            position: absolute;
            top: -50px;
            color: red;
            font-weight: bold;
            font-size: 18px;
            pointer-events: none;
            animation: fall linear forwards;
        }
        /* rơi xuống + lắc nhẹ */
        
        @keyframes fall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>



    <div id="section-3">
        <div class="photo-contain"></div>
    </div>

    const photos = [];

    // 👉 tạo ảnh
    images.forEach((src) => {
        const img = document.createElement("img");
        img.src = src;
        img.className = "photo";

        img.style.left = window.innerWidth / 2 + "px";
        img.style.top = window.innerHeight / 2 + "px";

        contain.appendChild(img);

        photos.push({
            el: img,
            angle: Math.random() * Math.PI * 2,
            radius: 100 + Math.random() * 150,
            speed: 0.01 + Math.random() * 0.02
        });
    });

    let isFormingHeart = false;

    // ❤️ trái tim
    function getHeartPositions(count) {
        const positions = [];
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        for (let i = 0; i < count; i++) {
            let t = Math.PI * 2 * (i / count);

            let x = 16 * Math.pow(Math.sin(t), 3);
            let y =
                13 * Math.cos(t) -
                5 * Math.cos(2 * t) -
                2 * Math.cos(3 * t) -
                Math.cos(4 * t);

            positions.push({
                x: centerX + x * 12,
                y: centerY - y * 12
            });
        }

        return positions;
    }

    // 🎬 bay vòng
    function animate() {
        photos.forEach(p => {
            if (!isFormingHeart) {
                p.angle += p.speed;

                const x = window.innerWidth / 2 + Math.cos(p.angle) * p.radius;
                const y = window.innerHeight / 2 + Math.sin(p.angle) * p.radius;

                p.el.style.left = x + "px";
                p.el.style.top = y + "px";
                p.el.style.transform = `rotate(${p.angle * 50}deg)`;
            }
        });

        requestAnimationFrame(animate);
    }
    animate();

    // 💖 tạo chữ rơi
    function createFallingText() {
        const text = document.createElement("div");
        text.className = "fall-text";

        const messages = ["anh ❤️ em", "yêu em 💕", "miss u ❤️"];
        text.innerHTML = messages[Math.floor(Math.random() * messages.length)];

        text.style.left = Math.random() * window.innerWidth + "px";

        const duration = 3 + Math.random() * 3;
        text.style.animationDuration = duration + "s";

        text.style.fontSize = 14 + Math.random() * 10 + "px";

        contain.appendChild(text);

        setTimeout(() => {
            text.remove();
        }, duration * 1000);
    }

    // 💖 mưa chữ liên tục
    function startFallingLoop() {
        for (let i = 0; i < 6; i++) {
            createFallingText();
        }

        const delay = 150 + Math.random() * 300;
        setTimeout(startFallingLoop, delay);
    }

    // 👉 GHÉP TIM + BẮT ĐẦU MƯA CHỮ
    setTimeout(() => {
        isFormingHeart = true;

        const heart = getHeartPositions(photos.length);

        photos.forEach((p, i) => {
            p.el.style.transition = "all 2s ease";
            p.el.style.left = heart[i].x + "px";
            p.el.style.top = heart[i].y + "px";
            p.el.style.transform = "scale(1.2)";
        });

        // 🔥 BẮT ĐẦU RƠI NGAY LÚC GHÉP
        startFallingLoop();

    }, 4000);

    window.addEventListener("load", () => {
        const audio = document.getElementById("bg-music");

        // bật play
        audio.play().then(() => {
            audio.muted = false; // mở tiếng lại
        }).catch(() => {
            console.log("Autoplay bị chặn");
        });
    });
